<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白馬キャンプ 選曲リスト</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f2f1; margin: 0; padding: 20px; color: #323130; }
        .page-container { max-width: 960px; margin: 0 auto; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid #0078d4; }
        .page-header { padding: 24px 30px; border-bottom: 1px solid #edebe9; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .page-header h1 { margin: 0; font-size: 22px; color: #323130; }
        .header-tools { display: flex; align-items: center; gap: 12px; }
        .updated-at { font-size: 12px; color: #605e5c; }
        .btn-refresh { background-color: #0078d4; color: white; border: none; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 4px; cursor: pointer; }
        .btn-refresh:hover { background-color: #005a9e; }
        .sheet-area { padding: 20px; }
        .loading-msg { color: #0078d4; font-size: 14px; font-style: italic; padding: 20px; }

        /* 横: 通常のHTML表のためtable-layout+折り返しで画面幅にちょうど収まる(横バーなし)
           縦: 行数分だけページが伸びるため、行が増えても見切れなし(iframe時代の高さ調整は不要) */
        table.song-list { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; }
        table.song-list th, table.song-list td { border: 1px solid #c8c6c4; padding: 6px 8px; word-break: break-word; overflow-wrap: break-word; vertical-align: middle; }
        table.song-list th { background-color: #0078d4; color: #ffffff; font-weight: 600; text-align: center; }
        table.song-list td.col-meeting { background-color: #f3f9fe; font-weight: 600; text-align: center; }
        table.song-list td.col-type { background-color: #f9f8f7; font-weight: 600; text-align: center; }
        table.song-list td.col-order { text-align: center; color: #605e5c; }
        /* 列幅: 聖会/前後/奉仕者名/曲順/選曲 */
        col.c-meeting { width: 14%; }
        col.c-type { width: 12%; }
        col.c-singer { width: 24%; }
        col.c-order { width: 13%; }
        col.c-song { width: 37%; }
        @media (max-width: 480px) {
            body { padding: 8px; }
            table.song-list { font-size: 11px; }
            table.song-list th, table.song-list td { padding: 4px 4px; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="page-header">
        <h1>白馬キャンプ 選曲リスト</h1>
        <div class="header-tools">
            <span class="updated-at" id="updatedAt"></span>
            <button type="button" class="btn-refresh" onclick="loadList()">最新に更新</button>
        </div>
    </div>
    <div class="sheet-area">
        <div id="listLoading" class="loading-msg">データを読み込み中...</div>
        <div id="listContainer"></div>
    </div>
</div>

<script>
    const CONFIG = {
        GAS_WEBAPP_URL: 'https://script.google.com/macros/s/AKfycbwL-UmKIU8fQUFdMnUJAQLK__ID8wQVb6tE6A5hxDhRt4SNrv4oHZ5kJ921rBoTZoAobg/exec'
    };
    const AUTO_REFRESH_MS = 60000; // ページを開いたままでも60秒ごとに自動更新(不要なら0に)

    function fetchJSONP(url, params, callbackName) {
        return new Promise((resolve, reject) => {
            window[callbackName] = function(data) { resolve(data); document.getElementById(scriptId).remove(); delete window[callbackName]; };
            const scriptId = 'jsonp_' + Date.now() + Math.floor(Math.random()*1000);
            const script = document.createElement('script'); script.id = scriptId;
            let queryParams = { callback: callbackName, ...params };
            let queryString = Object.keys(queryParams).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(queryParams[k])).join('&');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + queryString;
            script.onerror = () => { reject(new Error('通信失敗')); document.getElementById(scriptId).remove(); delete window[callbackName]; };
            document.body.appendChild(script);
        });
    }

    function escapeHtml(str) { return (str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

    // 聖会(1列目)・前後(2列目)の値が入っている行から次に値が入る行までを1グループとし、
    // シートの縦結合セルをrowspanで再現する
    function calcRowspans(rows, colIdx) {
        const spans = new Array(rows.length).fill(0);
        let anchor = -1;
        for (let i = 0; i < rows.length; i++) {
            if (rows[i][colIdx]) { anchor = i; spans[i] = 1; }
            else if (anchor >= 0) { spans[anchor]++; }
        }
        return spans; // 値がある行=グループの行数、それ以外=0(セル出力なし)
    }

    function renderTable(rows) {
        const container = document.getElementById('listContainer');
        if (!rows || rows.length < 2) { container.innerHTML = '<p>表示するデータがありません。</p>'; return; }

        const header = rows[0];
        const body = rows.slice(1).map(r => [ (r[0] || "").replace(/\s+/g, ""), r[1] || "", r[2] || "", r[3] || "", r[4] || "" ]);
        const meetingSpans = calcRowspans(body, 0);
        const typeSpans = calcRowspans(body, 1);

        let html = '<table class="song-list"><colgroup><col class="c-meeting"><col class="c-type"><col class="c-singer"><col class="c-order"><col class="c-song"></colgroup>';
        html += '<thead><tr>' + header.slice(0, 5).map(h => `<th>${escapeHtml(h)}</th>`).join('') + '</tr></thead><tbody>';
        body.forEach((r, i) => {
            html += '<tr>';
            if (meetingSpans[i] > 0) html += `<td class="col-meeting" rowspan="${meetingSpans[i]}">${escapeHtml(r[0])}</td>`;
            if (typeSpans[i] > 0) html += `<td class="col-type" rowspan="${typeSpans[i]}">${escapeHtml(r[1])}</td>`;
            html += `<td>${escapeHtml(r[2])}</td>`;
            html += `<td class="col-order">${escapeHtml(r[3])}</td>`;
            html += `<td>${escapeHtml(r[4])}</td>`;
            html += '</tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    async function loadList() {
        const loading = document.getElementById('listLoading');
        loading.style.display = 'block';
        try {
            const result = await fetchJSONP(CONFIG.GAS_WEBAPP_URL, { action: 'loadList' }, 'cb_list');
            renderTable(result.rows || []);
            const now = new Date();
            document.getElementById('updatedAt').textContent = '取得時刻: ' + now.toLocaleTimeString('ja-JP');
        } catch (e) {
            document.getElementById('listContainer').innerHTML = '<p style="color:#a4262c;">一覧の取得に失敗しました。再読み込みしてください。</p>';
        } finally {
            loading.style.display = 'none';
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        loadList();
        if (AUTO_REFRESH_MS > 0) setInterval(loadList, AUTO_REFRESH_MS);
    });
</script>
</body>
</html>
