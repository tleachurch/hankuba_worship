<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白馬キャンプ 選曲リスト</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f2f1; margin: 0; padding: 20px; color: #323130; }
        .page-container { max-width: 960px; margin: 0 auto; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid #0078d4; }
        .page-header { padding: 24px 30px; border-bottom: 1px solid #edebe9; }
        .page-header h1 { margin: 0; font-size: 22px; color: #323130; }
        .sheet-area { padding: 20px; }
        /* 横: iframeを実寸で描画し、画面幅に合わせてscale縮小することで
           内部スクロールバーを出さずにちょうど収める */
        .sheet-wrap { overflow: hidden; margin: 0 auto; }
        #sheetFrame { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 4px; display: block; transform-origin: top left; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="page-header"><h1>白馬キャンプ 選曲リスト</h1></div>
    <div class="sheet-area">
        <div class="sheet-wrap" id="sheetWrap">
            <!-- 縦: 行追加(10〜20行)に備え range を A1:E120 に拡張し、高さも余裕を持たせる -->
            <iframe id="sheetFrame" scrolling="no"
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQQgvLw2ca6IIzECURZtQv6XkzLvy8xpPfR1N5NmBDG8LOBybvcsIF3QSwN1yB0Pg/pubhtml?gid=298531511&amp;single=true&amp;widget=true&amp;headers=false&amp;range=A1:E120"></iframe>
        </div>
    </div>
</div>

<script>
    // シートのA〜E列を実寸表示したときの幅(px)。表が右で見切れる/右に余白が出る場合はこの値を調整してください。
    const BASE_WIDTH = 860;
    // 表示高さ(px)。range=A1:E120(現在約81行+追加余裕)が収まる高さ。行をさらに増やす場合はrangeと合わせて調整してください。
    const BASE_HEIGHT = 2900;

    function fitSheet() {
        const wrap = document.getElementById('sheetWrap');
        const frame = document.getElementById('sheetFrame');
        const avail = wrap.parentElement.clientWidth; // .sheet-area の内側幅
        const scale = Math.min(1, avail / BASE_WIDTH);
        frame.style.width = BASE_WIDTH + 'px';
        frame.style.height = BASE_HEIGHT + 'px';
        frame.style.transform = 'scale(' + scale + ')';
        wrap.style.width = Math.floor(BASE_WIDTH * scale) + 'px';
        wrap.style.height = Math.floor(BASE_HEIGHT * scale) + 'px';
    }
    window.addEventListener('DOMContentLoaded', fitSheet);
    window.addEventListener('resize', fitSheet);
</script>
</body>
</html>
