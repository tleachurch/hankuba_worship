<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白馬キャンプ賛美選曲（コーラス）連絡フォーム</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f2f1; margin: 0; padding: 20px; color: #323130; }
        .form-container { max-width: 680px; margin: 0 auto; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid #0078d4; }
        .form-header { padding: 30px; background-color: #ffffff; border-bottom: 1px solid #edebe9; }
        .form-header h1 { margin: 0 0 15px 0; font-size: 24px; color: #323130; }
        .form-header p { margin: 5px 0; font-size: 14px; color: #605e5c; line-height: 1.5; }
        .section { padding: 30px; border-bottom: 1px solid #edebe9; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #0078d4; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .required::after { content: " *"; color: #a4262c; }
        .form-control, select, textarea { width: 100%; padding: 10px; border: 1px solid #a19f9d; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .song-filter-group { display: flex; gap: 10px; margin-bottom: 8px; }
        .song-filter-group select { flex: 1; }
        .radio-group { margin-top: 8px; }
        .radio-item { margin-bottom: 10px; display: flex; align-items: center; }
        .radio-item input { margin-right: 10px; }
        .footnote { font-size: 13px; color: #a4262c; margin-top: 6px; font-weight: bold; }
        .btn-submit { background-color: #0078d4; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: 600; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-submit:hover { background-color: #106ebe; }
        .hidden { display: none !important; }
        .loading-msg { color: #0078d4; font-size: 14px; font-style: italic; }
        .info-bar { background-color: #f3f2f1; padding: 12px; border-left: 4px solid #0078d4; font-size: 13px; margin-bottom: 20px; font-weight: 600; }

        /* モーダルポップアップ共通設定 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #ffffff; width: 90%; max-width: 500px; border-radius: 6px; box-shadow: 0 12px 40px rgba(0,0,0,0.25); overflow: hidden; border-top: 6px solid #0078d4; }
        .modal-header { padding: 16px 20px; background: #f3f2f1; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #edebe9; }
        .modal-title { font-size: 16px; font-weight: 600; color: #323130; }
        .modal-body { padding: 24px 20px; font-size: 14px; color: #323130; line-height: 1.6; }
        .modal-footer { padding: 14px 20px; background: #f3f2f1; display: flex; flex-direction: column; gap: 10px; }
        .modal-btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-modal-yes { background-color: #0078d4; color: white; border: none; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-modal-no { background-color: #ffffff; color: #323130; border: 1px solid #a19f9d; padding: 10px 20px; font-size: 14px; border-radius: 4px; cursor: pointer; }
        .btn-modal-option { background-color: #f3f2f1; color: #0078d4; border: 1px solid #0078d4; padding: 12px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; text-align: left; width: 100%; margin-bottom: 8px; }
        .btn-modal-option:hover { background-color: #f3f9fe; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h1>白馬キャンプ賛美選曲（コーラス）連絡フォーム</h1>
        <p>選曲と同時にまとめて連絡する場合は、こちらのフォームでまとめて送ることができます。</p>
    </div>

    <form id="worshipForm">
        <div class="section">
            <div class="section-title">セクション 1: 奉仕内容</div>
            
            <div class="form-group">
                <label class="required">1. 担当の賛美</label>
                <div class="radio-group">
                    <div class="radio-item"><input type="radio" name="displayWorshipType" value="会衆賛美" required> 会衆賛美</div>
                    <div class="radio-item"><input type="radio" name="displayWorshipType" value="特別賛美"> 特別賛美</div>
                </div>
            </div>

            <div id="route_congregation" class="hidden">
                <div class="form-group">
                    <label class="required">2. 奉仕者名（チーム名）</label>
                    <select id="singerName" name="singerName"><option value="">データを読み込み中...</option></select>
                </div>
            </div>

            <div id="route_special" class="hidden">
                <div class="form-group">
                    <label class="required">2. 特別賛美 チーム名</label>
                    <select id="specialTeamSelect"><option value="">選択してください</option></select>
                </div>
                <div id="specialTeamManualArea" class="form-group hidden">
                    <label class="required">チーム名入力（その他）</label>
                    <input type="text" id="specialTeamManual" class="form-control" placeholder="チーム名を入力してください">
                </div>
                <div class="form-group">
                    <label class="required">3. 奉仕する聖会・集会</label>
                    <select id="meetingEventSpecial">
                        <option value="">選択してください</option>
                        <option value="14火・夜の聖会">14火・夜の聖会</option>
                        <option value="15水・早天聖会">15水・早天聖会</option>
                        <option value="15水・開会聖会">15水・開会聖会</option>
                        <option value="15水・夜の聖会">15水・夜の聖会</option>
                        <option value="16木・早天聖会">16木・早天聖会</option>
                        <option value="16木・夜の聖会">16木・夜の聖会</option>
                        <option value="17金・早天聖会">17金・早天聖会</option>
                        <option value="17金・閉会聖会">17金・閉会聖会</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="required">4. オケの有無</label>
                    <div class="radio-group">
                        <div class="radio-item"><input type="radio" name="orchestraType" value="オケ有"> オケ有</div>
                        <div class="radio-item"><input type="radio" name="orchestraType" value="オケ無" checked> オケ無</div>
                    </div>
                </div>
            </div>

            <div id="autoInfoBar" class="info-bar hidden"></div>

            <div id="manualSelectGroup" class="hidden">
                <div class="form-group">
                    <label class="required">変更後：奉仕する聖会・集会</label>
                    <select id="meetingEventManual">
                        <option value="">選択してください</option>
                        <option value="14火・夜の聖会">14火・夜の聖会</option>
                        <option value="15水・早天聖会">15水・早天聖会</option>
                        <option value="15水・開会聖会">15水・開会聖会</option>
                        <option value="15水・夜の聖会">15水・夜の聖会</option>
                        <option value="16木・早天聖会">16木・早天聖会</option>
                        <option value="16木・夜の聖会">16木・夜の聖会</option>
                        <option value="17金・早天聖会">17金・早天聖会</option>
                        <option value="17金・閉会聖会">17金・閉会聖会</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="required">変更後：賛美区分</label>
                    <div class="radio-group">
                        <div class="radio-item"><input type="radio" name="worshipTypeManual" value="前半賛美"> 前半賛美</div>
                        <div class="radio-item"><input type="radio" name="worshipTypeManual" value="後半賛美"> 後半賛美</div>
                    </div>
                </div>
            </div>

            <input type="hidden" id="finalContactType" name="contactType" value="新規">
        </div>

        <div id="selectionSection" class="section hidden">
            <div class="section-title">セクション 2: 選曲</div>

            <div id="flow_congregation" class="hidden">
                <div id="step_song1" class="form-group hidden">
                    <label class="required">選曲(1曲目)</label>
                    <div class="song-filter-group"><select id="book_filter1" onchange="filterSongs(1)"><option value="">歌集を選択</option></select></div>
                    <select id="song1" name="song1"><option value="">まず歌集を選択してください</option></select>
                </div>
                <div id="step_branch1" class="form-group hidden">
                    <label class="required">次曲選曲項目</label>
                    <div class="radio-group" id="branch1RadioGroup"></div>
                </div>
                <div id="step_song2" class="form-group hidden">
                    <label class="required">選曲(2曲目)</label>
                    <div class="song-filter-group"><select id="book_filter2" onchange="filterSongs(2)"><option value="">歌集を選択</option></select></div>
                    <select id="song2" name="song2"><option value="">まず歌集を選択してください</option></select>
                </div>
                <div id="step_branch2" class="form-group hidden">
                    <label class="required">次曲選曲項目</label>
                    <div class="radio-group" id="branch2RadioGroup"></div>
                </div>
                <div id="step_song3" class="form-group hidden">
                    <label class="required">選曲(3曲目)</label>
                    <div class="song-filter-group"><select id="book_filter3" onchange="filterSongs(3)"><option value="">歌集を選択</option></select></div>
                    <select id="song3" name="song3"><option value="">まず歌集を選択してください</option></select>
                </div>
                <div id="step_branch3" class="form-group hidden">
                    <label class="required">次曲選曲項目</label>
                    <div class="radio-group"><div class="radio-item"><input type="radio" name="branch3" value="prophecy" checked> 預言後の選曲へ</div></div>
                </div>
                <div id="step_prophecy" class="form-group hidden"><label class="required">預言後の曲</label><select id="prophecySong" name="prophecySong"></select></div>
                <div id="prophecyFootnote" class="footnote hidden">※後半賛美の預言後は固定になります。</div>
            </div>

            <div id="flow_special" class="hidden">
                <div class="form-group">
                    <label class="required">特別賛美 選曲（1曲のみ）</label>
                    <div class="song-filter-group"><select id="book_filterSpecial" onchange="filterSongs('Special')"><option value="">歌集を選択</option></select></div>
                    <select id="specialSongSelect" class="form-control"><option value="">まず歌集を選択してください</option></select>
                    <input type="text" id="specialSongManual" class="form-control hidden" style="margin-top:8px;" placeholder="曲名を直接手入力してください">
                </div>
            </div>
        </div>

        <div class="section">
            <div class="form-group"><label>コーラス・備考欄</label><textarea id="remarks" name="remarks" rows="3" placeholder="回答を入力してください"></textarea></div>
            <button type="submit" class="btn-submit" id="submitBtn">送信</button>
            <span id="loadingMsg" class="loading-msg hidden">データを送信中...</span>
        </div>
    </form>
</div>

<div id="initModal" class="modal-overlay" style="display: flex;">
    <div class="modal-box">
        <div class="modal-header"><div class="modal-title">📋 連絡区分の選択</div></div>
        <div class="modal-body">
            <p style="margin-top:0; font-size:14px; color:#605e5c;">今回の選曲連絡の区分を最初に選択してください。</p>
            <div class="form-group" style="background:#f3f2f1; padding:20px; border-radius:6px; margin-bottom:10px;">
                <label style="font-weight:bold; color:#0078d4; margin-bottom:10px; display:block; font-size:14px;">連絡内容 *</label>
                <div class="radio-group" style="display:flex; gap:30px;">
                    <div class="radio-item"><input type="radio" name="initContactType" value="新規" checked style="transform: scale(1.2); margin-right:8px;"> <span style="font-weight:600; font-size:15px;">新規連絡</span></div>
                    <div class="radio-item"><input type="radio" name="initContactType" value="変更" style="transform: scale(1.2); margin-right:8px;"> <span style="font-weight:600; font-size:15px;">変更連絡</span></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-submit" style="width:100%; padding:12px;" onclick="closeInitModal()">連絡区分を確定して進む ➔</button>
        </div>
    </div>
</div>

<div id="smartModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <div class="modal-header"><div class="modal-title">📋 担当聖会の自動判定</div></div>
        <div class="modal-body" id="smartModalBody"></div>
        <div class="modal-footer" id="smartModalFooter"></div>
    </div>
</div>

<script>
    const CONFIG = {
        GAS_WEBAPP_URL: 'https://script.google.com/macros/s/AKfycbwL-UmKIU8fQUFdMnUJAQLK__ID8wQVb6tE6A5hxDhRt4SNrv4oHZ5kJ921rBoTZoAobg/exec' 
    };

    let masterData = { singers: [], allSongs: [], earlyProphecySongs: [], bookedSongs: [], bookCategories: [], dynamicDuties: [], specialTeams: [] };
    let finalWorshipType = ""; 
    let finalMeetingEvent = ""; 
    let originalSongsMap = {}; 

    function fetchJSONP(url, params, callbackName) {
        return new Promise((resolve, reject) => {
            window[callbackName] = function(data) { resolve(data); document.getElementById(scriptId).remove(); delete window[callbackName]; };
            const scriptId = 'jsonp_' + Date.now() + Math.floor(Math.random()*1000);
            const script = document.createElement('script'); script.id = scriptId;
            let queryParams = { callback: callbackName, ...params };
            let queryString = Object.keys(queryParams).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(queryParams[k])).join('&');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + queryString;
            script.onerror = () => { reject(new Error('通信失敗')); document.getElementById(scriptId).remove(); delete window[callbackName]; };
            document.body.appendChild(script);
        });
    }

    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const result = await fetchJSONP(CONFIG.GAS_WEBAPP_URL, { action: 'loadInit' }, 'cb_init');
            masterData.singers = result.singers;
            masterData.dynamicDuties = result.dynamicDuties || [];
            masterData.specialTeams = result.specialTeams || [];
            
            masterData.earlyProphecySongs = result.earlyProphecySongs.map(song => {
                let prefix = song.code.startsWith('K') ? '風のひびき' : 'やすらぎの歌';
                let volume = song.code.replace(/^[KY]/, '');
                return `${prefix} ${volume}集 ${song.num} ${song.title}`;
            });
            
            let categories = new Set();
            masterData.allSongs = result.allSongs.map(song => {
                let prefix = song.code.startsWith('K') ? '風のひびき' : 'やすらぎの歌';
                let volume = song.code.replace(/^[KY]/, '');
                let textCategory = `${prefix} ${volume}集`; 
                categories.add(textCategory);
                return { category: textCategory, num: song.num, title: song.title, fullName: `${prefix} ${volume}集 ${song.num} ${song.title}` };
            });
            masterData.bookCategories = Array.from(categories).sort((a,b) => b.localeCompare(a, 'ja', {numeric: true}));
            
            renderSingerDropdown(); renderSpecialTeamDropdown(); buildFilterDropdowns(); initEventListeners();
        } catch(e) { alert("マスターデータの初期同期に失敗しました。"); }
    });

    // ★【修正箇所】style.style.display ➔ style.display へタイポを修正！
    function closeInitModal() {
        const val = document.querySelector('input[name="initContactType"]:checked').value;
        document.getElementById('finalContactType').value = val;
        document.getElementById('initModal').style.display = 'none'; 
        document.getElementById('initModal').classList.add('hidden');
    }

    function renderSingerDropdown() {
        const select = document.getElementById('singerName'); select.innerHTML = '<option value="">選択してください</option>';
        masterData.singers.forEach(name => { const opt = document.createElement('option'); opt.value = name; opt.textContent = name; select.appendChild(opt); });
    }

    function renderSpecialTeamDropdown() {
        const select = document.getElementById('specialTeamSelect'); select.innerHTML = '<option value="">選択してください</option>';
        masterData.specialTeams.forEach(team => { const opt = document.createElement('option'); opt.value = team; opt.textContent = team; select.appendChild(opt); });
        const otherOpt = document.createElement('option'); otherOpt.value = "__OTHER__"; otherOpt.textContent = "その他（手入力）"; select.appendChild(otherOpt);
    }

    function buildFilterDropdowns() {
        ['1', '2', '3', 'Special'].forEach(id => {
            const f = document.getElementById(`book_filter${id}`); if(!f) return;
            f.innerHTML = '<option value="">歌集・集数を選択</option>';
            masterData.bookCategories.forEach(cat => { const opt = document.createElement('option'); opt.value = cat; opt.textContent = cat; f.appendChild(opt); });
            if(id === 'Special') { const otherOpt = document.createElement('option'); otherOpt.value = "__MANUAL__"; otherOpt.textContent = "その他（直接手入力する）"; f.appendChild(otherOpt); }
        });
    }

    function filterSongs(stepId, defaultVal = "") {
        const filterVal = document.getElementById(`book_filter${stepId}`).value;
        if (stepId === 'Special') {
            if (filterVal === '__MANUAL__') { showElement('specialSongSelect', false); showElement('specialSongManual', true); if(defaultVal) document.getElementById('specialSongManual').value = defaultVal; return; } 
            else { showElement('specialSongSelect', true); showElement('specialSongManual', false); }
        }
        const targetSelect = document.getElementById(stepId === 'Special' ? 'specialSongSelect' : `song${stepId}`);
        targetSelect.innerHTML = '<option value="">曲を選択してください</option>'; if(!filterVal) return;
        const filtered = masterData.allSongs.filter(s => s.category === filterVal);
        filtered.forEach(song => {
            const isBooked = masterData.bookedSongs.includes(song.fullName);
            const opt = document.createElement('option'); opt.value = song.fullName; opt.textContent = `${song.num} ${song.title}`; 
            if (isBooked && song.fullName !== defaultVal) { opt.disabled = true; opt.textContent += " (既に入力済み)"; } targetSelect.appendChild(opt);
        });
        if(defaultVal) targetSelect.value = defaultVal;
    }

    function handleMainWorshipTypeChange(type) {
        showElement('route_congregation', type === '会衆賛美'); showElement('route_special', type === '特別賛美');
        document.getElementById('manualSelectGroup').classList.add('hidden');
        resetSelectionSection();
    }

    function checkSingerDuty() {
        const singerName = document.getElementById('singerName').value;
        if (!singerName) { resetSelectionSection(); return; }

        const matches = masterData.dynamicDuties.filter(d => d.team === singerName);
        const modal = document.getElementById('smartModal');
        const body = document.getElementById('smartModalBody');
        const footer = document.getElementById('smartModalFooter');

        if (matches.length === 1) {
            const duty = matches[0];
            body.innerHTML = `あなたは <strong>【${duty.meeting} の ${duty.type} (通常曲数:${duty.maxSongs}曲)】</strong> のご担当でお間違いないですか？`;
            footer.innerHTML = `
                <div class="modal-btn-group">
                    <button type="button" class="btn-modal-no" onclick="applyManualSelect()">いいえ(変更)</button>
                    <button type="button" class="btn-modal-yes" onclick="applyAutoSelect('${duty.meeting}', '${duty.type}', ${JSON.stringify(duty.songs)})">はい</button>
                </div>`;
            modal.style.display = 'flex'; 
        } else if (matches.length > 1) {
            let html = `<strong>${singerName}</strong> は複数のご担当がシートに割り当てられています。<br>今回入力するものをタップしてください：<br><br>`;
            matches.forEach(duty => { 
                let songsStr = JSON.stringify(duty.songs);
                html += `<button type="button" class="btn-modal-option" onclick="applyAutoSelect('${duty.meeting}', '${duty.type}', ${escapeHtml(songsStr)})">📅 ${duty.meeting} (${duty.type} - 通常曲数:${duty.maxSongs}曲)</button>`; 
            });
            body.innerHTML = html;
            footer.innerHTML = `<button type="button" class="btn-modal-no" style="width:100%" onclick="applyManualSelect()">一覧にないため手動(変更)で選ぶ</button>`;
            modal.style.display = 'flex';
        } else {
            applyManualSelect();
        }
    }

    function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

    function applyAutoSelect(meeting, type, currentSongs) {
        document.getElementById('smartModal').style.display = 'none';
        document.getElementById('manualSelectGroup').classList.add('hidden');
        
        finalMeetingEvent = meeting; finalWorshipType = type;
        originalSongsMap = currentSongs || {}; 

        const contactType = document.getElementById('finalContactType').value;
        const infoBar = document.getElementById('autoInfoBar');
        infoBar.innerHTML = `✅ 確定情報 ➔ 連絡区分: <strong>${contactType}</strong> / 担当聖会: <strong>${meeting} 【${type}】</strong>`;
        infoBar.classList.remove('hidden');
        updateBookedSongs();
    }

    function applyManualSelect() {
        document.getElementById('smartModal').style.display = 'none';
        document.getElementById('autoInfoBar').classList.add('hidden');
        document.getElementById('selectionSection').classList.add('hidden');
        showElement('manualSelectGroup', true);
        document.getElementById('meetingEventManual').value = "";
        document.querySelectorAll('input[name="worshipTypeManual"]').forEach(r => r.checked = false);
        originalSongsMap = {}; 
    }

    function handleManualSelectionChange() {
        const meeting = document.getElementById('meetingEventManual').value;
        const typeElem = document.querySelector('input[name="worshipTypeManual"]:checked');
        if (!meeting || !typeElem) return;
        finalMeetingEvent = meeting; finalWorshipType = typeElem.value;
        const currentDuty = masterData.dynamicDuties.filter(d => d.meeting === finalMeetingEvent && d.type === finalWorshipType)[0];
        originalSongsMap = currentDuty ? currentDuty.songs : {};
        updateBookedSongs();
    }

    function closeModalAndReset() { document.getElementById('smartModal').style.display = 'none'; document.getElementById('singerName').value = ""; resetSelectionSection(); }
    function resetSelectionSection() { showElement('selectionSection', false); showElement('autoInfoBar', false); }
    function cleanSongName(name) { if(!name) return ""; return name.replace(/\(変更\)/g, "").replace(/\(オケ有\)/g, "").replace(/\(オケ無\)/g, "").trim(); }

    async function updateBookedSongs() {
        const isSpecial = document.querySelector('input[name="displayWorshipType"]:checked').value === '特別賛美';
        if (isSpecial) {
            finalMeetingEvent = document.getElementById('meetingEventSpecial').value; finalWorshipType = "特別賛美";
            if(!finalMeetingEvent || !document.getElementById('specialTeamSelect').value) return;
            const currentDuty = masterData.dynamicDuties.filter(d => d.meeting === finalMeetingEvent && d.type === finalWorshipType)[0];
            originalSongsMap = currentDuty ? currentDuty.songs : {};
        }
        
        showElement('selectionSection', true); 
        showElement('flow_congregation', !isSpecial); 
        showElement('flow_special', isSpecial);
        if (!isSpecial) {
            ['step_song1','step_branch1','step_song2','step_branch2','step_song3','step_branch3','prophecyFootnote','step_prophecy'].forEach(id => showElement(id, false));
            showElement('step_song1', true);
        }
        
        try {
            const result = await fetchJSONP(CONFIG.GAS_WEBAPP_URL, { action: 'loadBooked', meetingEvent: finalMeetingEvent, worshipType: finalWorshipType }, 'cb_booked');
            masterData.bookedSongs = result.bookedSongs || [];
            
            if (isSpecial) {
                let existSong = originalSongsMap["選曲"] || "";
                let plainSong = cleanSongName(existSong);
                if (existSong.indexOf("(オケ有)") >= 0) document.querySelectorAll('input[name="orchestraType"]')[0].checked = true;
                else if (existSong.indexOf("(オケ無)") >= 0) document.querySelectorAll('input[name="orchestraType"]')[1].checked = true;
                
                if (plainSong) {
                    let matchCat = masterData.allSongs.filter(s => s.fullName === plainSong)[0];
                    if (matchCat) { document.getElementById('book_filterSpecial').value = matchCat.category; filterSongs('Special', plainSong); } 
                    else { document.getElementById('book_filterSpecial').value = "__MANUAL__"; filterSongs('Special', plainSong); }
                } else {
                    document.getElementById('book_filterSpecial').value = "";
                    document.getElementById('specialSongSelect').innerHTML = '<option value="">まず歌集を選択してください</option>';
                }
            } else {
                for (let i = 1; i <= 3; i++) {
                    let key = i.toString();
                    if (i === 3 && finalWorshipType === '前半賛美') {
                        key = originalSongsMap["2(預言後)"] ? "2(預言後)" : (originalSongsMap["3(預言後)"] ? "3(預言後)" : "3");
                    }
                    let existSong = originalSongsMap[key] || "";
                    let plainSong = cleanSongName(existSong);
                    if (plainSong) {
                        if (i === 3 && finalWorshipType === '前半賛美' && key.indexOf("預言後") >= 0) { setupEarlyProphecyDropdown(plainSong); } 
                        else {
                            let matchCat = masterData.allSongs.filter(s => s.fullName === plainSong)[0];
                            if (matchCat) { document.getElementById(`book_filter${i}`).value = matchCat.category; filterSongs(i, plainSong); }
                        }
                    } else {
                        document.getElementById(`book_filter${i}`).value = "";
                        document.getElementById(`song${i}`).innerHTML = '<option value="">まず歌集を選択してください</option>';
                        if (i === 3 && finalWorshipType === '前半賛美') setupEarlyProphecyDropdown();
                    }
                }
            }
            if(originalSongsMap["備考欄"]) document.getElementById('remarks').value = originalSongsMap["備考欄"];
        } catch(e) { console.error(e); }
    }

    function setupEarlyProphecyDropdown(defaultVal = "") {
        const select = document.getElementById('song3'); if(!select) return;
        select.innerHTML = '<option value="">曲を選択してください（前半賛美預言後）</option>';
        let isMatched = false;
        masterData.earlyProphecySongs.forEach(songFullName => {
            const isBooked = masterData.bookedSongs.includes(songFullName);
            const opt = document.createElement('option'); opt.value = songFullName; opt.textContent = songFullName;
            if (isBooked && songFullName !== defaultVal) { opt.disabled = true; opt.textContent += " (既に入力済み)"; } 
            select.appendChild(opt); if (songFullName === defaultVal) isMatched = true;
        });
        const otherOpt = document.createElement('option'); otherOpt.value = "__OTHER__"; otherOpt.textContent = "その他（全曲一覧から検索する）"; select.appendChild(otherOpt);
        if (defaultVal) {
            if (isMatched) { select.value = defaultVal; } else {
                select.value = "__OTHER__"; document.getElementById('filter_area3').classList.remove('hidden');
                let matchCat = masterData.allSongs.filter(s => s.fullName === defaultVal)[0];
                if (matchCat) { document.getElementById('book_filter3').value = matchCat.category; filterSongs(3, defaultVal); }
            }
        }
    }

    function initEventListeners() {
        document.querySelectorAll('input[name="displayWorshipType"]').forEach(r => r.addEventListener('change', (e) => handleMainWorshipTypeChange(e.target.value)));
        document.getElementById('singerName').addEventListener('change', checkSingerDuty);
        document.getElementById('meetingEventManual').addEventListener('change', handleManualSelectionChange);
        document.querySelectorAll('input[name="worshipTypeManual"]').forEach(r => r.addEventListener('change', handleManualSelectionChange));
        document.getElementById('specialTeamSelect').addEventListener('change', (e) => { showElement('specialTeamManualArea', e.target.value === '__OTHER__'); updateBookedSongs(); });
        document.getElementById('meetingEventSpecial').addEventListener('change', updateBookedSongs);
        document.getElementById('song1').addEventListener('change', () => handleSongSelect(1));
        document.getElementById('song2').addEventListener('change', () => handleSongSelect(2));
        document.getElementById('song3').addEventListener('change', (e) => {
            if(e.target.value === "__OTHER__") { document.getElementById('filter_area3').classList.remove('hidden'); document.getElementById('song3').innerHTML = '<option value="">まず歌集を選択してください</option>'; }
        });
    }

    function showElement(id, isShow) { const el = document.getElementById(id); if (isShow) el.classList.remove('hidden'); else el.classList.add('hidden'); }

    function handleSongSelect(stepNum) {
        const activeDuty = masterData.dynamicDuties.filter(d => d.meeting === finalMeetingEvent && d.type === finalWorshipType)[0];
        const maxNormal = activeDuty ? activeDuty.maxSongs : 2;
        if (stepNum === 1) {
            const container = document.getElementById('branch1RadioGroup'); let html = '';
            if (maxNormal >= 2) html += `<div class="radio-item"><input type="radio" name="branch1" value="next" onclick="handleBranch(1,'next')"> 2曲目選曲へ</div>`;
            if (finalWorshipType === '前半賛美') html += `<div class="radio-item"><input type="radio" name="branch1" value="prophecy" onclick="handleBranch(1,'prophecy')"> 「預言後の曲」へ</div>`;
            html += `<div class="radio-item"><input type="radio" name="branch1" value="end" onclick="handleBranch(1,'end')"> 選曲終了</div>`;
            container.innerHTML = html; showElement('step_branch1', true);
        } else if (stepNum === 2) {
            const container = document.getElementById('branch2RadioGroup'); let html = '';
            if (maxNormal >= 3) html += `<div class="radio-item"><input type="radio" name="branch2" value="next" onclick="handleBranch(2,'next')"> 3曲目選曲へ</div>`;
            if (finalWorshipType === '前半賛美') html += `<div class="radio-item"><input type="radio" name="branch2" value="prophecy" onclick="handleBranch(2,'prophecy')"> 「預言後の曲」へ</div>`;
            html += `<div class="radio-item"><input type="radio" name="branch2" value="end" onclick="handleBranch(2,'end')"> 選曲終了</div>`;
            container.innerHTML = html; showElement('step_branch2', true);
        }
    }

    function handleBranch(stepNum, val) {
        if (stepNum === 1) {
            showElement('step_song2', val === 'next'); if (val === 'prophecy') openProphecyStep(2);
            if (val === 'end') { ['step_song2','step_branch2','step_song3','step_branch3','step_prophecy','prophecyFootnote'].forEach(id => showElement(id, false)); }
        } else if (stepNum === 2) {
            showElement('step_song3', val === 'next'); if (val === 'prophecy') openProphecyStep(3);
            if (val === 'end') { ['step_song3','step_branch3','step_prophecy','prophecyFootnote'].forEach(id => showElement(id, false)); }
        }
    }

    function openProphecyStep(targetPositionNum) {
        ['step_song2','step_branch2','step_song3','step_branch3','step_prophecy','prophecyFootnote'].forEach(id => showElement(id, false));
        const targetSelect = document.getElementById('song3'); targetSelect.setAttribute('name', 'song' + targetPositionNum);
        if (finalWorshipType === '前半賛美') { document.getElementById('filter_area3').classList.add('hidden'); setupEarlyProphecyDropdown(); showElement('step_song3', true); } else { showElement('prophecyFootnote', true); }
    }

    document.getElementById('worshipForm').addEventListener('submit', async (e) => {
        e.preventDefault(); const submitBtn = document.getElementById('submitBtn'); const loadingMsg = document.getElementById('loadingMsg');
        submitBtn.disabled = true; loadingMsg.classList.remove('hidden');
        const formData = new FormData(e.target); const rawData = Object.fromEntries(formData.entries());
        
        const isChangeMode = rawData.contactType === '変更';
        const processSongName = (key, currentVal) => {
            if (!currentVal) return currentVal;
            if (!isChangeMode) return currentVal; 
            let originalRaw = originalSongsMap[key] || "";
            let originalClean = cleanSongName(originalRaw);
            let currentClean = cleanSongName(currentVal);
            if (originalClean !== currentClean) { return currentClean + '(変更)'; }
            return originalRaw; 
        };

        let songMap = {}; let groupName = "";
        if (finalWorshipType === '特別賛美') {
            const teamSel = document.getElementById('specialTeamSelect').value;
            groupName = teamSel === '__OTHER__' ? document.getElementById('specialTeamManual').value : teamSel;
            const isManualSong = document.getElementById('book_filterSpecial').value === '__MANUAL__';
            let specSong = isManualSong ? document.getElementById('specialSongManual').value : document.getElementById('specialSongSelect').value;
            
            let orchType = rawData.orchestraType || "オケ無";
            specSong = cleanSongName(specSong) + `(${orchType})`;
            songMap["選曲"] = processSongName("選曲", specSong);
        } else {
            if (rawData.song1) songMap["1"] = processSongName("1", rawData.song1);
            if (rawData.song2 && !document.getElementById('step_song2').classList.contains('hidden')) songMap["2"] = processSongName("2", rawData.song2);
            
            const activeDuty = masterData.dynamicDuties.filter(d => d.meeting === finalMeetingEvent && d.type === finalWorshipType)[0];
            const maxNormal = activeDuty ? activeDuty.maxSongs : 2;
            
            if (finalWorshipType === '前半賛美') {
                let activeBranch = document.querySelector('input[name="branch1"]:checked')?.value;
                let activeBranch2 = document.querySelector('input[name="branch2"]:checked')?.value;
                if (maxNormal === 1 || activeBranch === 'prophecy') { if (rawData.song2) songMap["2(預言後)"] = processSongName("2(預言後)", rawData.song2); }
                else if (maxNormal === 2 || activeBranch2 === 'prophecy') { if (rawData.song3) songMap["3(預言後)"] = processSongName("3(預言後)", rawData.song3); }
            } else if (finalWorshipType === '後半賛美') {
                if (maxNormal === 1) { songMap["2(固定)"] = processSongName("2(固定)", "God is Working For My Good"); }
                if (maxNormal === 2) { songMap["1"] = processSongName("1", rawData.song1); songMap["2"] = processSongName("2", rawData.song2); songMap["3(固定)"] = processSongName("3(固定)", "God is Working For My Good"); }
                if (maxNormal === 3) { songMap["1"] = processSongName("1", rawData.song1); songMap["2"] = processSongName("2", rawData.song2); songMap["3"] = processSongName("3", rawData.song3); songMap["4(固定)"] = processSongName("4(固定)", "God is Working For My Good"); }
            }
        }

        const postPayload = { meetingEvent: finalMeetingEvent, worshipType: finalWorshipType, singerName: rawData.singerName || "", groupName: groupName, orchestraDetails: rawData.orchestraType || "", remarks: rawData.remarks || "", action: 'submit', songMap: songMap, contactType: rawData.contactType };
        try { await fetch(CONFIG.GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify(postPayload) }); alert('選曲連絡が正常に送信され、スプレッドシートへ反映されました！'); e.target.reset(); handleMainWorshipTypeChange(''); } catch (error) { alert('送信エラー。'); } 
        finally { submitBtn.disabled = false; loadingMsg.classList.add('hidden'); }
    });
</script>
</body>
</html>
