<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白馬キャンプ賛美選曲（コーラス）連絡フォーム</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f2f1; margin: 0; padding: 20px; color: #323130; }
        .form-container { max-width: 680px; margin: 0 auto; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid #0078d4; }
        .form-header { padding: 30px; background-color: #ffffff; border-bottom: 1px solid #edebe9; }
        .form-header h1 { margin: 0 0 15px 0; font-size: 24px; color: #323130; }
        .form-header p { margin: 5px 0; font-size: 14px; color: #605e5c; line-height: 1.5; }
        .section { padding: 30px; border-bottom: 1px solid #edebe9; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #0078d4; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .required::after { content: " *"; color: #a4262c; }
        .form-control, select, textarea { width: 100%; padding: 10px; border: 1px solid #a19f9d; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .song-filter-group { display: flex; gap: 10px; margin-bottom: 8px; }
        .song-filter-group select { flex: 1; }
        .radio-group { margin-top: 8px; }
        .radio-item { margin-bottom: 10px; display: flex; align-items: center; }
        .radio-item input { margin-right: 10px; }
        .footnote { font-size: 13px; color: #a4262c; margin-top: 6px; font-weight: bold; }
        .btn-submit { background-color: #0078d4; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: 600; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-submit:hover { background-color: #005a9e; }
        .hidden { display: none !important; }
        .loading-msg { color: #0078d4; font-size: 14px; font-style: italic; }
        .info-bar { background-color: #f3f2f1; padding: 12px; border-left: 4px solid #0078d4; font-size: 13px; margin-bottom: 20px; font-weight: 600; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #ffffff; width: 90%; max-width: 500px; border-radius: 6px; box-shadow: 0 12px 40px rgba(0,0,0,0.25); overflow: hidden; border-top: 6px solid #0078d4; }
        .modal-header { padding: 16px 20px; background: #f3f2f1; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #edebe9; }
        .modal-title { font-size: 16px; font-weight: 600; color: #323130; }
        .modal-body { padding: 24px 20px; font-size: 14px; color: #323130; line-height: 1.6; }
        .modal-footer { padding: 14px 20px; background: #f3f2f1; display: flex; flex-direction: column; gap: 10px; }
        .modal-btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-modal-yes { background-color: #0078d4; color: white; border: none; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-modal-no { background-color: #ffffff; color: #323130; border: 1px solid #a19f9d; padding: 10px 20px; font-size: 14px; border-radius: 4px; cursor: pointer; }
        .btn-modal-option { background-color: #f3f2f1; color: #0078d4; border: 1px solid #0078d4; padding: 12px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; text-align: left; width: 100%; margin-bottom: 8px; }
        .btn-modal-option:hover { background-color: #f3f9fe; }
        .btn-delete { background-color: #a4262c; color: #ffffff; border: none; padding: 10px 16px; font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-delete:hover { background-color: #8a1f24; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h1>白馬キャンプ賛美選曲（コーラス）連絡フォーム</h1>
        <p>選曲と同時にまとめて連絡する場合は、こちらのフォームでまとめて送ることができます。</p>
        <p style="margin-top: 10px; font-size: 14px; font-weight: bold;">
            <a href="https://tleachurch.github.io/hakuba_worship/list.html" target="_blank" rel="noopener" style="color: #0078d4; text-decoration: underline;">選曲一覧はこちら</a>
        </p>
    </div>

    <form id="worshipForm">
        <div class="section">
            <div class="section-title">セクション 1: 奉仕内容</div>

            <div class="form-group">
                <label class="required">1. 担当の賛美</label>
                <div class="radio-group">
                    <div class="radio-item"><input type="radio" name="displayWorshipType" value="会衆賛美" required> 会衆賛美</div>
                    <div class="radio-item"><input type="radio" name="displayWorshipType" value="特別賛美"> 特別賛美</div>
                </div>
            </div>

            <div id="route_congregation" class="hidden">
                <div class="form-group">
                    <label class="required">2. 奉仕者名（チーム名）</label>
                    <select id="singerName" name="singerName"><option value="">選択してください</option></select>
                </div>
            </div>

            <div id="route_special" class="hidden">
                <div class="form-group">
                    <label class="required">2. 特別賛美 チーム名</label>
                    <select id="specialTeamSelect"><option value="">選択してください</option></select>
                </div>
                <div id="specialTeamManualArea" class="form-group hidden">
                    <label class="required">チーム名入力（新規追加）</label>
                    <input type="text" id="specialTeamManual" class="form-control" placeholder="チーム名を入力してください">
                </div>
                <div class="form-group">
                    <label class="required">3. 奉仕する聖会・集会</label>
                    <select id="meetingEventSpecial">
                        <option value="">選択してください</option>
                        <option value="14(火)夜の聖会">14(火)夜の聖会</option>
                        <option value="15(水)早天聖会">15(水)早天聖会</option>
                        <option value="15(水)開会聖会">15(水)開会聖会</option>
                        <option value="15(水)夜の聖会">15(水)夜の聖会</option>
                        <option value="16(木)早天聖会">16(木)早天聖会</option>
                        <option value="16(木)夜の聖会">16(木)夜の聖会</option>
                        <option value="17(金)早天聖会">17(金)早天聖会</option>
                        <option value="17(金)閉会聖会">17(金)閉会聖会</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="required">4. オケの有無</label>
                    <div class="radio-group">
                        <div class="radio-item"><input type="radio" name="okeType" value="オケ有"> オケ有</div>
                        <div class="radio-item"><input type="radio" name="okeType" value="オケ無" checked> オケ無</div>
                    </div>
                </div>
            </div>

            <div id="autoInfoBar" class="info-bar hidden"></div>

            <div id="manualSelectGroup" class="hidden">
                <div class="form-group">
                    <label class="required">奉仕する聖会・集会</label>
                    <select id="meetingEventManual">
                        <option value="">選択してください</option>
                        <option value="14(火)夜の聖会">14(火)夜の聖会</option>
                        <option value="15(水)早天聖会">15(水)早天聖会</option>
                        <option value="15(水)開会聖会">15(水)開会聖会</option>
                        <option value="15(水)夜の聖会">15(水)夜の聖会</option>
                        <option value="16(木)早天聖会">16(木)早天聖会</option>
                        <option value="16(木)夜の聖会">16(木)夜の聖会</option>
                        <option value="17(金)早天聖会">17(金)早天聖会</option>
                        <option value="17(金)閉会聖会">17(金)閉会聖会</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="required">賛美区分</label>
                    <div class="radio-group">
                        <div class="radio-item"><input type="radio" name="worshipTypeManual" value="前半賛美"> 前半賛美</div>
                        <div class="radio-item"><input type="radio" name="worshipTypeManual" value="後半賛美"> 後半賛美</div>
                    </div>
                </div>
            </div>

            <input type="hidden" id="finalContactType" name="contactType" value="新規">
        </div>

        <div id="selectionSection" class="section hidden">
            <div class="section-title">セクション 2: 選曲</div>

            <div id="flow_congregation" class="hidden">
                <div id="dynamicSongArea"></div>
            </div>

            <div id="flow_special" class="hidden">
                <div class="form-group">
                    <label class="required">特別賛美 選曲（1曲のみ）</label>
                    <input type="text" id="specialSongSearch" class="form-control" placeholder="曲名の一部を入力して全歌集から検索（例: 恵み）" style="margin-bottom:8px;">
                    <div class="song-filter-group"><select id="book_filterSpecial" onchange="filterSongsSpecial()"><option value="">歌集を選択</option></select></div>
                    <select id="specialSongSelect" class="form-control"><option value="">まず歌集を選択するか、曲名で検索してください</option></select>
                    <input type="text" id="specialSongManual" class="form-control hidden" style="margin-top:8px;" placeholder="曲名を直接手入力してください">
                </div>
            </div>
        </div>

        <div class="section">
            <div class="form-group"><label>コーラス・備考欄</label><textarea id="remarks" name="remarks" rows="3" placeholder="回答を入力してください"></textarea></div>
            <textarea id="completeText" class="form-control hidden" rows="1" readonly></textarea>
            <button type="submit" class="btn-submit" id="submitBtn">送信</button>
            <span id="loadingMsg" class="loading-msg hidden">データを送信中...</span>
            <!-- ① 変更連絡で登録済みエントリがある場合のみ表示。押下で確認ポップ→シートから削除 -->
            <button type="button" class="btn-delete hidden" id="deleteSpecialBtn" onclick="openDeleteConfirm()">🗑 この聖会の登録内容を削除する</button>
        </div>
    </form>
</div>

<div id="initModal" class="modal-overlay" style="display: flex;">
    <div class="modal-box">
        <div class="modal-header"><div class="modal-title">📋 連絡区分の選択</div></div>
        <div class="modal-body">
            <p style="margin-top:0; font-size:14px; color:#605e5c;">今回の選曲連絡の区分を最初に選択してください。</p>
            <div class="form-group" style="background:#f3f2f1; padding:20px; border-radius:6px; margin-bottom:10px;">
                <label style="font-weight:bold; color:#0078d4; margin-bottom:10px; display:block; font-size:14px;">連絡内容 *</label>
                <div class="radio-group" style="display:flex; gap:30px;">
                    <div class="radio-item"><input type="radio" name="initContactType" value="新規" checked style="transform: scale(1.2); margin-right:8px;"> <span style="font-weight:600; font-size:15px;">新規連絡</span></div>
                    <div class="radio-item"><input type="radio" name="initContactType" value="変更" style="transform: scale(1.2); margin-right:8px;"> <span style="font-weight:600; font-size:15px;">変更連絡</span></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-submit" style="width:100%; padding:12px;" onclick="closeInitModal()">連絡区分を確定して進む ➔</button>
        </div>
    </div>
</div>

<div id="smartModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <div class="modal-header"><div class="modal-title">📋 担当聖会の自動判定</div></div>
        <div class="modal-body" id="smartModalBody"></div>
        <div class="modal-footer" id="smartModalFooter"></div>
    </div>
</div>

<div id="overwriteWarnModal" class="modal-overlay" style="display: none;">
    <div class="modal-box" style="border-top-color: #ca5010;">
        <div class="modal-header"><div class="modal-title">⚠ 既に登録があります</div></div>
        <div class="modal-body" id="overwriteWarnBody"></div>
        <div class="modal-footer">
            <div class="modal-btn-group">
                <button type="button" class="btn-modal-no" onclick="continueAsNewOverwrite()">新規のまま続ける（上書き）</button>
                <button type="button" class="btn-modal-yes" style="background-color: #ca5010;" onclick="switchToChangeMode()">変更として続ける</button>
            </div>
        </div>
    </div>
</div>

<div id="deleteConfirmModal" class="modal-overlay" style="display: none;">
    <div class="modal-box" style="border-top-color: #a4262c;">
        <div class="modal-header"><div class="modal-title">🗑 削除の確認</div></div>
        <div class="modal-body" id="deleteConfirmBody"></div>
        <div class="modal-footer">
            <div class="modal-btn-group">
                <button type="button" class="btn-modal-no" onclick="document.getElementById('deleteConfirmModal').style.display='none'">いいえ</button>
                <button type="button" class="btn-modal-yes" style="background-color: #a4262c;" onclick="executeSpecialDelete()">はい、削除する</button>
            </div>
        </div>
    </div>
</div>

<div id="completeModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <div class="modal-header"><div class="modal-title">✅ 送信完了</div></div>
        <div class="modal-body">
            <p style="margin-top:0;">選曲連絡が正常に送信され、スプレッドシートへ反映されました。<br>以下の内容をコピーしてご利用いただけます。</p>
            <textarea id="completeTextDisplay" class="form-control" rows="8" readonly></textarea>
            <p style="margin-bottom:0;">選曲リストは<a href="https://tleachurch.github.io/hakuba_worship/list.html" target="_blank" rel="noopener">こちら</a></p>
        </div>
        <div class="modal-footer">
            <div class="modal-btn-group">
                <button type="button" class="btn-modal-no" onclick="closeCompleteModal()">閉じる</button>
                <button type="button" class="btn-modal-yes" onclick="copyCompleteText()">📋 内容をコピー</button>
            </div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        GAS_WEBAPP_URL: 'https://script.google.com/macros/s/AKfycbwL-UmKIU8fQUFdMnUJAQLK__ID8wQVb6tE6A5hxDhRt4SNrv4oHZ5kJ921rBoTZoAobg/exec'
    };

    const FIXED_SONG = "God is Working for My Good(Merlin Carothers)";

    let masterData = { singers: [], allSongs: [], earlyProphecySongs: [], bookedSongs: [], bookCategories: [], dynamicDuties: [], specialTeams: [] };
    let finalWorshipType = "";
    let finalMeetingEvent = "";
    let originalSongsMap = {};
    let pendingBookedResult = null; // ③ 上書き警告時にloadBooked結果を保持し「変更として続ける」で再利用
    let songInputKeys = []; 

    function formatMeetingNameForDisplay(str) {
        if (!str) return "";
        let clean = str.toString().replace(/\s+/g, "");
        clean = clean.replace(/^(\d+)([月火水木金土日])・?/, "$1($2)");
        return clean;
    }

    function fetchJSONP(url, params, callbackName) {
        return new Promise((resolve, reject) => {
            window[callbackName] = function(data) { resolve(data); document.getElementById(scriptId).remove(); delete window[callbackName]; };
            const scriptId = 'jsonp_' + Date.now() + Math.floor(Math.random()*1000);
            const script = document.createElement('script'); script.id = scriptId;
            let queryParams = { callback: callbackName, ...params };
            let queryString = Object.keys(queryParams).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(queryParams[k])).join('&');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + queryString;
            script.onerror = () => { reject(new Error('通信失敗：GAS側が反応していません。デプロイが正常か確認してください。')); document.getElementById(scriptId).remove(); delete window[callbackName]; };
            document.body.appendChild(script);
        });
    }

    window.addEventListener('DOMContentLoaded', async () => {
        // ③ データ読込完了を待たずにリスナーを登録(読込中の初回クリックが無反応になる問題の修正)
        initEventListeners();
        try {
            // キャッシュ仕様: バージョン付きキー+24時間で失効。
            // (旧実装は無期限のため、全曲タブ更新が一度キャッシュした端末に永久反映されなかった)
            const CACHE_VER = 'v2';
            const CACHE_TTL_MS = 24 * 60 * 60 * 1000;
            const cachedSongs = localStorage.getItem('hakuba_cached_songs_' + CACHE_VER);
            const cachedCats = localStorage.getItem('hakuba_cached_cats_' + CACHE_VER);
            const cachedAt = Number(localStorage.getItem('hakuba_cached_at_' + CACHE_VER) || 0);
            let skipSongsParam = "false";

            if (cachedSongs && cachedCats && cachedAt && (Date.now() - cachedAt < CACHE_TTL_MS)) {
                try {
                    masterData.allSongs = JSON.parse(cachedSongs);
                    masterData.bookCategories = JSON.parse(cachedCats);
                    skipSongsParam = "true"; 
                } catch(cacheErr) {
                    skipSongsParam = "false";
                }
            }

            const result = await fetchJSONP(CONFIG.GAS_WEBAPP_URL, { action: 'loadInit', skipSongs: skipSongsParam }, 'cb_init');
            
            masterData.singers = result.singers || [];
            masterData.dynamicDuties = result.dynamicDuties || [];
            masterData.specialTeams = result.specialTeams || [];
            
            const rawProphecy = result.earlyProphecySongs || [];

            const rawAllSongs = result.allSongs || [];
            if (rawAllSongs.length > 0) {
                let categories = new Set();
                masterData.allSongs = rawAllSongs.map(song => {
                    let prefix = (song.code && song.code.startsWith('K')) ? '風のひびき' : 'やすらぎの歌';
                    let volume = song.code ? song.code.replace(/^[KY]/, '').replace(/^0+/, '') : '';
                    let textCategory = `${prefix} ${volume}集`;
                    categories.add(textCategory);
                    return { category: textCategory, num: song.num || '', title: song.title || '', fullName: `${prefix} ${volume}集 ${song.num || ''} ${song.title || ''}` };
                });
                masterData.bookCategories = Array.from(categories).sort((a,b) => b.localeCompare(a, 'ja', {numeric: true}));
                
                try {
                    localStorage.setItem('hakuba_cached_songs_' + CACHE_VER, JSON.stringify(masterData.allSongs));
                    localStorage.setItem('hakuba_cached_cats_' + CACHE_VER, JSON.stringify(masterData.bookCategories));
                    localStorage.setItem('hakuba_cached_at_' + CACHE_VER, String(Date.now()));
                } catch(storageErr) { /* ストレージ不可環境でも動作継続 */ }
            }

            // ① 預言後の曲を全曲リストの同一(歌集コード,番号)エントリに正規化する。
            //   預言後タブと全曲タブで同じ曲のタイトル表記が揺れており(例:「唯一人」vs「唯一」)、
            //   fullName文字列のままだと同一曲を重複検知できないため、全曲側の表記に統一する。
            //   ※allSongs構築後に実行する必要があるためこの位置に配置。
            const buildFull = (code, num) => {
                let prefix = (code && code.startsWith('K')) ? '風のひびき' : 'やすらぎの歌';
                let volume = code ? code.replace(/^[KY]/, '').replace(/^0+/, '') : '';
                return { category: `${prefix} ${volume}集`, volume: volume };
            };
            masterData.earlyProphecySongs = rawProphecy.map(song => {
                const code = song.code || ''; const num = (song.num || '').toString();
                const b = buildFull(code, num);
                const match = (masterData.allSongs || []).filter(s => s.category === b.category && String(s.num) === num)[0];
                return match ? match.fullName : `${b.category} ${num} ${song.title || ''}`;
            });

            renderSingerDropdown(); renderSpecialTeamDropdown(); buildSpecialFilterDropdown();
            // ③ 読込中に区分が選択されていた場合、完了時点で後続質問を描画し直す
            const checkedType = document.querySelector('input[name="displayWorshipType"]:checked');
            if (checkedType) handleMainWorshipTypeChange(checkedType.value);
        } catch(e) { 
            console.error(e);
            alert("マスターデータの同期に失敗しました。\n[詳細原因]: " + e.message + "\n\n※ブラウザを再読み込みするか、GAS側が正しくデプロイ更新されているかご確認ください。"); 
        }
    });

    // 送信ボタンのラベルを連絡区分に応じて切替(変更連絡なら「この情報に変更する」)
    function updateSubmitButtonLabel() {
        const isChange = document.getElementById('finalContactType').value === '変更';
        document.getElementById('submitBtn').textContent = isChange ? 'この情報に変更する' : '送信';
    }

    function closeInitModal() {
        const val = document.querySelector('input[name="initContactType"]:checked').value;
        document.getElementById('finalContactType').value = val;
        updateSubmitButtonLabel();
        document.getElementById('initModal').style.display = 'none';
        document.getElementById('initModal').classList.add('hidden');
    }

    function renderSingerDropdown() {
        const select = document.getElementById('singerName'); select.innerHTML = '<option value="">選択してください</option>';
        masterData.singers.forEach(name => { const opt = document.createElement('option'); opt.value = name; opt.textContent = name; select.appendChild(opt); });
    }

    function renderSpecialTeamDropdown() {
        const select = document.getElementById('specialTeamSelect'); select.innerHTML = '<option value="">選択してください</option>';
        masterData.specialTeams.forEach(team => { const opt = document.createElement('option'); opt.value = team; opt.textContent = team; select.appendChild(opt); });
        const otherOpt = document.createElement('option'); otherOpt.value = "__OTHER__"; otherOpt.textContent = "新規追加"; select.appendChild(otherOpt);
    }

    function buildSpecialFilterDropdown() {
        const f = document.getElementById('book_filterSpecial');
        f.innerHTML = '<option value="">歌集・集数を選択</option>';
        if(masterData.bookCategories) {
            masterData.bookCategories.forEach(cat => { const opt = document.createElement('option'); opt.value = cat; opt.textContent = cat; f.appendChild(opt); });
        }
        const otherOpt = document.createElement('option'); otherOpt.value = "__MANUAL__"; otherOpt.textContent = "その他（直接手入力する）"; f.appendChild(otherOpt);
    }

    function filterSongsSpecial(defaultVal = "") {
        const filterVal = document.getElementById('book_filterSpecial').value;
        // ⑦ 歌集絞り込みを使ったら曲名検索はクリア(両方式の混在を防ぐ)
        if (filterVal) document.getElementById('specialSongSearch').value = "";
        if (filterVal === '__MANUAL__') { showElement('specialSongSelect', false); showElement('specialSongManual', true); if(defaultVal) document.getElementById('specialSongManual').value = defaultVal; return; }
        else { showElement('specialSongSelect', true); showElement('specialSongManual', false); }
        const targetSelect = document.getElementById('specialSongSelect');
        targetSelect.innerHTML = '<option value="">曲を選択してください</option>'; if(!filterVal) return;
        
        masterData.allSongs.filter(s => s.category === filterVal).forEach(song => {
            const opt = document.createElement('option'); opt.value = song.fullName; opt.textContent = `${song.num} ${song.title}`;
            targetSelect.appendChild(opt);
        });
        if(defaultVal) targetSelect.value = defaultVal;
    }

    // ⑦ 特別賛美のみ: 曲名の部分一致で全歌集から絞り込み表示
    function handleSpecialSongSearch() {
        const term = document.getElementById('specialSongSearch').value.trim().toLowerCase();

    function getActiveDuty() {
        return masterData.dynamicDuties.filter(d => d.meeting === finalMeetingEvent && d.type === finalWorshipType)[0];
    }

    function checkSingerDuty() {
        const singerName = document.getElementById('singerName').value;
        if (!singerName) { resetSelectionSection(); return; }

        // ③ 新規・変更とも自動判定ポップを表示(会衆賛美の誤選択防止)。プレフィルの有無は各適用関数側で区分により制御。
        const matches = [];
        masterData.dynamicDuties.forEach((d, i) => { if (d.team === singerName) matches.push({ duty: d, index: i }); });
        const modal = document.getElementById('smartModal');
        const body = document.getElementById('smartModalBody');
        const footer = document.getElementById('smartModalFooter');

        if (matches.length === 1) {
            const duty = matches[0].duty;
            const prettyMeeting = formatMeetingNameForDisplay(duty.meeting);
            body.innerHTML = `あなたは <strong>【${prettyMeeting} の ${duty.type} (通常曲数:${duty.maxSongs}曲)】</strong> のご担当でお間違いないですか？`;
            footer.innerHTML = `
                <div class="modal-btn-group">
                    <button type="button" class="btn-modal-no" onclick="applyManualSelect()">いいえ（別の聖会・区分を手動で選ぶ）</button>
                    <button type="button" class="btn-modal-yes" onclick="applyAutoSelect(${matches[0].index})">はい</button>
                </div>`;
            modal.style.display = 'flex';
        } else if (matches.length > 1) {
            let html = `<strong>${singerName}</strong> は複数のご担当がシートに割り当てられています。<br>今回入力するものをタップしてください：<br><br>`;
            matches.forEach(m => {
                const prettyMeeting = formatMeetingNameForDisplay(m.duty.meeting);
                html += `<button type="button" class="btn-modal-option" onclick="applyAutoSelect(${m.index})">📅 ${prettyMeeting} (${m.duty.type} - 通常曲数:${m.duty.maxSongs}曲)</button>`;
            });
            body.innerHTML = html;
            footer.innerHTML = `<button type="button" class="btn-modal-no" style="width:100%" onclick="applyManualSelect()">一覧にないため別の聖会・区分を手動で選ぶ</button>`;
            modal.style.display = 'flex';
        } else {
            applyManualSelect();
        }
    }

    function applyAutoSelect(dutyIndex) {
        const duty = masterData.dynamicDuties[dutyIndex];
        document.getElementById('smartModal').style.display = 'none';
        document.getElementById('manualSelectGroup').classList.add('hidden');

        finalMeetingEvent = duty.meeting; finalWorshipType = duty.type;

        originalSongsMap = (document.getElementById('finalContactType').value === '新規') ? {} : (duty.songs || {});

        document.getElementById('selectionSection').classList.add('hidden');

    function resetSelectionSection() { showElement('selectionSection', false); showElement('autoInfoBar', false); }
    function cleanSongName(name) { if(!name) return ""; return name.replace(/\(変更\)/g, "").replace(/\(オケ有\)/g, "").replace(/\(オケ無\)/g, "").replace(/\(選択済み\)/g, "").replace(/\(既に入力済み\)/g, "").trim(); }

    // 登録済み曲名の表記揺れ(タイトル差異・集数のゼロ埋め等)を吸収して全曲リストから同一曲を探す。
    // 1) 完全一致 → 2) (歌集名, 集数, 番号)一致 の順で照合し、見つかった全曲側エントリを返す。
    function findSongLoose(name) {
        const clean = cleanSongName(name || '');
        if (!clean) return null;
        let m = masterData.allSongs.filter(s => s.fullName === clean)[0];
        if (m) return m;
        const mm = clean.match(/^(風のひびき|やすらぎの歌)\s*0*(\d+)集\s*(\S+)/);
        if (mm) {
            const cat = `${mm[1]} ${mm[2]}集`;
            m = masterData.allSongs.filter(s => s.category === cat && String(s.num) === String(mm[3]))[0];
            if (m) return m;
        }
        return null;
    }

    function updateAllSongOptions() {
        const currentSelectedValues = [];
        songInputKeys.forEach((key, idx) => {
            const el = document.getElementById(`song_dyn${idx}`);
            if (el && el.value && el.value !== "__OTHER__") {
                currentSelectedValues.push({ idx: idx, value: el.value });
            }
        });

        const cleanBookedSongs = (masterData.bookedSongs || []).map(s => cleanSongName(s));

        songInputKeys.forEach((key, idx) => {
            const select = document.getElementById(`song_dyn${idx}`);
            if (!select) return;

            const filterArea = document.getElementById(`filter_area_dyn${idx}`);
            const otherSelectedCleans = currentSelectedValues
                .filter(item => item.idx !== idx)
                .map(item => cleanSongName(item.value));

            Array.from(select.options).forEach(opt => {
                if (!opt.value || opt.value === "__OTHER__") return;

                let originalText = "";
                if (key.indexOf('預言後') >= 0 && (!filterArea || filterArea.classList.contains('hidden'))) {
                    originalText = opt.value; 
                } else {
                    const songObj = masterData.allSongs.filter(s => s.fullName === opt.value)[0];
                    originalText = songObj ? `${songObj.num} ${songObj.title}` : opt.value;
                }
                
                const songClean = cleanSongName(opt.value);

                // 自分の欄で現在選択中の曲、および変更連絡での自分の既存曲は無効化しない
                const ownOriginal = cleanSongName(originalSongsMap[key] || "");
                if (opt.value === select.value || (ownOriginal && songClean === ownOriginal)) {
                    opt.disabled = false;
                    opt.textContent = originalText;
                } else if (cleanBookedSongs.includes(songClean)) {
                    opt.disabled = true;
                    opt.textContent = originalText + " (既に入力済み)";
                } else if (otherSelectedCleans.includes(songClean)) {
                    opt.disabled = true;
                    opt.textContent = originalText + " (選択済み)";
                } else {
                    opt.disabled = false;
                    opt.textContent = originalText;
                }
            });
        });
    }

    function renderSongInputs() {
        const container = document.getElementById('dynamicSongArea');
        container.innerHTML = '';
        songInputKeys = [];
        const duty = getActiveDuty();
        const keys = (duty && duty.songKeys && duty.songKeys.length)
            ? duty.songKeys.filter(k => k !== '備考欄')
            : ['1', '2'];

        keys.forEach((key, idx) => {
            songInputKeys.push(key);
            const isFixed = key.indexOf('固定') >= 0;
            const isProphecy = key.indexOf('預言後') >= 0;
            const group = document.createElement('div');
            group.className = 'form-group';

            if (isFixed) {
                group.innerHTML = `<label class="required">選曲（曲順: ${key}）</label>
                    <div class="song-filter-group hidden" id="filter_area_dyn${idx}"><select id="book_filter_dyn${idx}" onchange="filterDynSongs(${idx})"><option value="">歌集・集数を選択</option></select></div>
                    <select id="song_dyn${idx}" required></select>`;
            } else if (isProphecy) {
                group.innerHTML = `<label class="required">選曲（曲順: ${key}）</label>
                    <div class="song-filter-group hidden" id="filter_area_dyn${idx}"><select id="book_filter_dyn${idx}" onchange="filterDynSongs(${idx})"><option value="">歌集・集数を選択</option></select></div>
                    <select id="song_dyn${idx}" required></select>`;
            } else {
                group.innerHTML = `<label class="required">選曲（曲順: ${key}曲目）</label>
                    <div class="song-filter-group"><select id="book_filter_dyn${idx}" onchange="filterDynSongs(${idx})"><option value="">歌集・集数を選択</option></select></div>
                    <select id="song_dyn${idx}" required><option value="">まず歌集を選択してください</option></select>`;
            }
            container.appendChild(group);

            const select = document.getElementById(`song_dyn${idx}`);
            if (!isFixed && !isProphecy) {
                select.onchange = () => { updateAllSongOptions(); };
            }

            const f = document.getElementById(`book_filter_dyn${idx}`);
            // ② 固定行は「歌集・集数を選択」の直下に固定曲の再選択項目を配置
            if (isFixed) {
                const fx = document.createElement('option'); fx.value = '__FIXED__'; fx.textContent = FIXED_SONG; f.appendChild(fx);
            }
            if(masterData.bookCategories) {
                masterData.bookCategories.forEach(cat => { const opt = document.createElement('option'); opt.value = cat; opt.textContent = cat; f.appendChild(opt); });
            }
            if (isProphecy) setupProphecyDropdownDyn(idx);
            if (isFixed) setupFixedDropdownDyn(idx);
        });
    }

    function setupFixedDropdownDyn(idx, defaultVal = "") {
        const select = document.getElementById(`song_dyn${idx}`); if (!select) return;
        select.innerHTML = '';
        
        const cleanBookedSongs = (masterData.bookedSongs || []).map(s => cleanSongName(s));
        const isFixedBooked = cleanBookedSongs.includes(cleanSongName(FIXED_SONG));

        const fixedOpt = document.createElement('option'); fixedOpt.value = FIXED_SONG; fixedOpt.textContent = FIXED_SONG; 
        if (isFixedBooked && cleanSongName(FIXED_SONG) !== cleanSongName(defaultVal)) { fixedOpt.disabled = true; fixedOpt.textContent += " (既に入力済み)"; }
        select.appendChild(fixedOpt);
        
        const otherOpt = document.createElement('option'); otherOpt.value = "__OTHER__"; otherOpt.textContent = "その他（全曲一覧から検索する）"; select.appendChild(otherOpt);
        select.value = FIXED_SONG;

        select.onchange = (e) => {
            if (e.target.value === "__OTHER__") {
                showElement(`filter_area_dyn${idx}`, true);
                select.innerHTML = '<option value="">まず歌集を選択してください</option>';
                select.onchange = () => { updateAllSongOptions(); };
            }
            updateAllSongOptions();
        };

        if (defaultVal && !/god\s*is\s*working/i.test(defaultVal)) {
            showElement(`filter_area_dyn${idx}`, true); select.onchange = () => { updateAllSongOptions(); };
            const matchCat = findSongLoose(defaultVal);
            if (matchCat) { document.getElementById(`book_filter_dyn${idx}`).value = matchCat.category; filterDynSongs(idx, matchCat.fullName); }
        }
        updateAllSongOptions();
    }

    function setupProphecyDropdownDyn(idx, defaultVal = "") {
        const select = document.getElementById(`song_dyn${idx}`); if (!select) return;
        select.innerHTML = '<option value="">曲を選択してください（前半賛美預言後）</option>';
        
        const cleanBookedSongs = (masterData.bookedSongs || []).map(s => cleanSongName(s));
        const cleanDefault = cleanSongName(defaultVal);
        let matchedValue = "";

        masterData.earlyProphecySongs.forEach(songFullName => {
            const isBooked = cleanBookedSongs.includes(cleanSongName(songFullName));
            const opt = document.createElement('option'); opt.value = songFullName; opt.textContent = songFullName;
            if (isBooked && cleanSongName(songFullName) !== cleanDefault) { opt.disabled = true; opt.textContent += " (既に入力済み)"; }
            select.appendChild(opt);
            if (cleanDefault && cleanSongName(songFullName) === cleanDefault) matchedValue = songFullName;
        });
        const otherOpt = document.createElement('option'); otherOpt.value = "__OTHER__"; otherOpt.textContent = "その他（全曲一覧から検索する）"; select.appendChild(otherOpt);

        select.onchange = (e) => {
            if (e.target.value === "__OTHER__") {
                showElement(`filter_area_dyn${idx}`, true);
                select.innerHTML = '<option value="">まず歌集を選択してください</option>';
                select.onchange = () => { updateAllSongOptions(); };
            }
            updateAllSongOptions();
        };

        if (defaultVal) {
            // 表記揺れ・旧表記(集数のゼロ埋め等)でも(歌集,集数,番号)一致なら預言後リスト側の同一曲として復元
            if (!matchedValue) {
                const loose = findSongLoose(defaultVal);
                if (loose) {
                    matchedValue = masterData.earlyProphecySongs.filter(fn => fn === loose.fullName)[0] || "";
                }
            }
            if (matchedValue) { select.value = matchedValue; }
            else {
                // 預言後リストに存在しない曲(「その他」で全曲から選ばれた曲)のみ全曲モードで復元
                showElement(`filter_area_dyn${idx}`, true); select.onchange = () => { updateAllSongOptions(); };
                const matchCat = findSongLoose(defaultVal);
                if (matchCat) { document.getElementById(`book_filter_dyn${idx}`).value = matchCat.category; filterDynSongs(idx, matchCat.fullName); }
            }
        }
        updateAllSongOptions();
    }

    function filterDynSongs(idx, defaultVal = "") {
        const filterVal = document.getElementById('book_filter_dyn' + idx).value;
        const targetSelect = document.getElementById('song_dyn' + idx);
        // ② フィルタで固定曲項目(__FIXED__)が選ばれたら、選曲欄を固定曲で確定
        if (filterVal === '__FIXED__') {
            targetSelect.innerHTML = '';
            const fx = document.createElement('option'); fx.value = FIXED_SONG; fx.textContent = FIXED_SONG;
            targetSelect.appendChild(fx);
            targetSelect.value = FIXED_SONG;
            updateAllSongOptions();
            return;
        }
        targetSelect.innerHTML = '<option value="">曲を選択してください</option>'; if (!filterVal) return;
        
        const cleanBookedSongs = (masterData.bookedSongs || []).map(s => cleanSongName(s));
        const cleanDefault = cleanSongName(defaultVal);

        masterData.allSongs.filter(s => s.category === filterVal).forEach(song => {
            const isBooked = cleanBookedSongs.includes(cleanSongName(song.fullName));
            const opt = document.createElement('option'); opt.value = song.fullName; opt.textContent = `${song.num} ${song.title}`;
            if (isBooked && cleanSongName(song.fullName) !== cleanDefault) { opt.disabled = true; opt.textContent += " (既に入力済み)"; }
            targetSelect.appendChild(opt);
        });
        if (defaultVal) targetSelect.value = defaultVal;
        updateAllSongOptions();
    }

    async function updateBookedSongs() {
        const worshipTypeElem = document.querySelector('input[name="displayWorshipType"]:checked');
        if (!worshipTypeElem) return;
        const isSpecial = worshipTypeElem.value === '特別賛美';

        if (isSpecial) {
            finalMeetingEvent = document.getElementById('meetingEventSpecial').value; 
            finalWorshipType = "特別賛美";
        }

        showElement('selectionSection', true);
        showElement('flow_congregation', !isSpecial);
        showElement('flow_special', isSpecial);

        if (!isSpecial) {
            renderSongInputs(); 
        } else {
            if(!finalMeetingEvent || !document.getElementById('specialTeamSelect').value) return;
        }

        try {
            const result = await fetchJSONP(CONFIG.GAS_WEBAPP_URL, { action: 'loadBooked', meetingEvent: finalMeetingEvent, worshipType: finalWorshipType }, 'cb_booked');
            masterData.bookedSongs = result.bookedSongs || [];

            if (isSpecial) {
                const teamSelVal = document.getElementById('specialTeamSelect').value;
                const selTeam = teamSelVal === '__OTHER__' ? document.getElementById('specialTeamManual').value.trim() : teamSelVal;
                // 【③新規ガード】新規連絡では既存入力を復元しない
                const isNewMode = document.getElementById('finalContactType').value === '新規';
                const entry = isNewMode ? null : (result.specialEntries || []).filter(en => en.team === selTeam)[0];
                // ① 変更連絡で登録済みエントリがある場合のみ削除ボタンを表示
                showElement('deleteSpecialBtn', !!entry);
                originalSongsMap = entry ? { "選曲": entry.song || "", "備考欄": entry.remarks || "" } : {};

                let existSong = originalSongsMap["選曲"] || "";
                let plainSong = cleanSongName(existSong);
                if (existSong.indexOf("(オケ有)") >= 0) document.querySelectorAll('input[name="okeType"]')[0].checked = true;
                else if (existSong.indexOf("(オケ無)") >= 0) document.querySelectorAll('input[name="okeType"]')[1].checked = true;

                if (plainSong) {
                    let matchCat = findSongLoose(plainSong);
                    if (matchCat) { document.getElementById('book_filterSpecial').value = matchCat.category; filterSongsSpecial(matchCat.fullName); }
                    else { document.getElementById('book_filterSpecial').value = "__MANUAL__"; filterSongsSpecial(plainSong); }
                } else {
                    document.getElementById('book_filterSpecial').value = "";
                    document.getElementById('specialSongSelect').innerHTML = '<option value="">まず歌集を選択してください</option>';
                }
            } else {
                // ⑤ 変更連絡では、サーバーから取得した最新の入力済み曲(songsMap)でプレフィル元を上書き
                //   (ページ読込時のdynamicDutiesが、同一セッション中の送信により古くなる問題への対応)
                const isNewModeCong = document.getElementById('finalContactType').value === '新規';

                // ③安全版: 新規なのにこの聖会・区分に既登録がある場合は上書き警告を表示
                //   判定は固定曲を除く選曲行・備考欄のいずれかに値があるか(固定曲は送信時のみ書かれ常に存在するため除外)
                if (isNewModeCong && result.songsMap) {
                    const hasExisting = Object.keys(result.songsMap).some(k =>
                        k.indexOf('固定') < 0 && (result.songsMap[k] || '').toString().trim() !== '');
                    if (hasExisting) {
                        pendingBookedResult = result; // 「変更として続ける」で再利用
                        openOverwriteWarn();
                    }
                }

                if (!isNewModeCong && result.songsMap && Object.keys(result.songsMap).length) {
                    originalSongsMap = result.songsMap;
                }
                songInputKeys.forEach((key, idx) => {
                    const plainSong = cleanSongName(originalSongsMap[key] || "");
                    if (key.indexOf('固定') >= 0) {
                        setupFixedDropdownDyn(idx, plainSong);
                    } else if (key.indexOf('預言後') >= 0) {
                        setupProphecyDropdownDyn(idx, plainSong);
                    } else if (plainSong) {
                        const matchCat = findSongLoose(plainSong);
                        if (matchCat) { document.getElementById('book_filter_dyn' + idx).value = matchCat.category; filterDynSongs(idx, matchCat.fullName); }
                    }
                });
                updateAllSongOptions();
            }
            if (originalSongsMap["備考欄"]) {
                let bikoVal = originalSongsMap["備考欄"];
                bikoVal = bikoVal.replace(/^オケ[有無]\s*\/\s*/, ""); 
                document.getElementById('remarks').value = bikoVal;
            }
        } catch(e) { console.error(e); }
    }

    // ③ 上書き警告ポップ制御(会衆賛美・新規で既登録がある場合に表示)
    function openOverwriteWarn() {
        const prettyMeeting = formatMeetingNameForDisplay(finalMeetingEvent);
        document.getElementById('overwriteWarnBody').innerHTML =
            `<strong>${prettyMeeting}【${finalWorshipType}】</strong>には既に選曲が登録されています。<br><br>「新規のまま続ける」と、送信時にこの聖会の既存の選曲が上書きされます。<br>過去の内容を引き継いで直したい場合は「変更として続ける」を選んでください。`;
        document.getElementById('overwriteWarnModal').style.display = 'flex';
    }
    function continueAsNewOverwrite() {
        // 新規のまま: 既存値は復元せず空欄のまま。送信で上書きされる。
        document.getElementById('overwriteWarnModal').style.display = 'none';
        pendingBookedResult = null;
    }
    function switchToChangeMode() {
        // 変更に切替え: 連絡区分を変更にし、既存の選曲をプレフィルして入力欄を復元
        document.getElementById('overwriteWarnModal').style.display = 'none';
        document.getElementById('finalContactType').value = '変更';
        updateSubmitButtonLabel();
        const infoBar = document.getElementById('autoInfoBar');
        const prettyMeeting = formatMeetingNameForDisplay(finalMeetingEvent);
        infoBar.innerHTML = `✅ 確定情報 ➔ 連絡区分: <strong>変更</strong> / 担当聖会: <strong>${prettyMeeting} 【${finalWorshipType}】</strong>`;
        infoBar.classList.remove('hidden');

        const result = pendingBookedResult;
        pendingBookedResult = null;
        if (result && result.songsMap && Object.keys(result.songsMap).length) {
            originalSongsMap = result.songsMap;
            songInputKeys.forEach((key, idx) => {
                const plainSong = cleanSongName(originalSongsMap[key] || "");
                if (key.indexOf('固定') >= 0) {
                    setupFixedDropdownDyn(idx, plainSong);
                } else if (key.indexOf('預言後') >= 0) {
                    setupProphecyDropdownDyn(idx, plainSong);
                } else if (plainSong) {
                    const matchCat = findSongLoose(plainSong);
                    if (matchCat) { document.getElementById('book_filter_dyn' + idx).value = matchCat.category; filterDynSongs(idx, matchCat.fullName); }
                }
            });
            updateAllSongOptions();
            if (originalSongsMap["備考欄"]) document.getElementById('remarks').value = originalSongsMap["備考欄"];
        }
    }

    function initEventListeners() {
        document.querySelectorAll('input[name="displayWorshipType"]').forEach(r => r.addEventListener('change', (e) => handleMainWorshipTypeChange(e.target.value)));
        document.getElementById('singerName').addEventListener('change', checkSingerDuty);
        document.getElementById('meetingEventManual').addEventListener('change', handleManualSelectionChange);
        document.querySelectorAll('input[name="worshipTypeManual"]').forEach(r => r.addEventListener('change', handleManualSelectionChange));
        document.getElementById('specialTeamSelect').addEventListener('change', (e) => { showElement('specialTeamManualArea', e.target.value === '__OTHER__'); updateBookedSongs(); });
        document.getElementById('specialTeamManual').addEventListener('change', updateBookedSongs);
        document.getElementById('meetingEventSpecial').addEventListener('change', updateBookedSongs);
        document.getElementById('specialSongSearch').addEventListener('input', handleSpecialSongSearch); // ⑦
    }

    function showElement(id, isShow) { const el = document.getElementById(id); if (!el) return; if (isShow) el.classList.remove('hidden'); else el.classList.add('hidden'); }

    function showCompleteModal(name, songMap) {
        const lines = [];
        const prettyMeeting = formatMeetingNameForDisplay(finalMeetingEvent);
        lines.push(`【${prettyMeeting} / ${finalWorshipType}】`);
        lines.push(`奉仕者名: ${name}`);
        Object.keys(songMap).forEach(k => lines.push(`${k}: ${songMap[k]}`));
        document.getElementById('completeTextDisplay').value = lines.join('\n');
        document.getElementById('completeModal').style.display = 'flex';
    }
    
    function closeCompleteModal() { document.getElementById('completeModal').style.display = 'none'; }

    // ① 特別賛美の削除(変更連絡で登録済みエントリがある場合のみボタンが表示される)
    function getSelectedSpecialTeam() {
        const teamSelVal = document.getElementById('specialTeamSelect').value;
        return teamSelVal === '__OTHER__' ? document.getElementById('specialTeamManual').value.trim() : teamSelVal;
    }
    function openDeleteConfirm() {
        const team = getSelectedSpecialTeam();
        const prettyMeeting = formatMeetingNameForDisplay(finalMeetingEvent);
        document.getElementById('deleteConfirmBody').innerHTML =
            `<strong>${prettyMeeting}【特別賛美】/ ${team}</strong><br>の登録内容(チーム名・曲・備考)をシートから削除します。<br><br>本当に削除してよろしいでしょうか？`;
        document.getElementById('deleteConfirmModal').style.display = 'flex';
    }
    async function executeSpecialDelete() {
        document.getElementById('deleteConfirmModal').style.display = 'none';
        const btn = document.getElementById('deleteSpecialBtn');
        btn.disabled = true;
        try {
            await fetch(CONFIG.GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify({
                action: 'deleteSpecial',
                meetingEvent: finalMeetingEvent,
                worshipType: '特別賛美',
                groupName: getSelectedSpecialTeam()
            }) });
            alert('削除しました。');
            document.getElementById('worshipForm').reset();
            handleMainWorshipTypeChange('');
            originalSongsMap = {}; songInputKeys = [];
            showElement('deleteSpecialBtn', false);
            document.getElementById('finalContactType').value = "新規";
            updateSubmitButtonLabel();
            try {
                const fresh = await fetchJSONP(CONFIG.GAS_WEBAPP_URL, { action: 'loadInit', skipSongs: 'true' }, 'cb_refresh_del');
                masterData.dynamicDuties = fresh.dynamicDuties || masterData.dynamicDuties;
                masterData.specialTeams = fresh.specialTeams || masterData.specialTeams;
                renderSpecialTeamDropdown();
            } catch (refreshErr) { /* 次回ページ読込で最新化 */ }
            const initModal = document.getElementById('initModal');
            initModal.style.display = 'flex'; initModal.classList.remove('hidden');
            document.querySelector('input[name="initContactType"][value="新規"]').checked = true;
        } catch (err) { alert('削除に失敗しました。'); }
        finally { btn.disabled = false; }
    }
    function copyCompleteText() {
        const ta = document.getElementById('completeTextDisplay');
        ta.select(); ta.setSelectionRange(0, 99999);
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(ta.value).then(() => alert('コピーしました。')).catch(() => { document.execCommand('copy'); alert('コピーしました。'); });
        } else {
            document.execCommand('copy'); alert('コピーしました。');
        }
    }

    document.getElementById('worshipForm').addEventListener('submit', async (e) => {
        e.preventDefault(); const submitBtn = document.getElementById('submitBtn'); const loadingMsg = document.getElementById('loadingMsg');
        submitBtn.disabled = true; loadingMsg.classList.remove('hidden');
        const formData = new FormData(e.target); const rawData = Object.fromEntries(formData.entries());

        const isChangeMode = rawData.contactType === '変更';
        const processSongName = (key, currentVal) => {
            if (!currentVal) return currentVal;
            if (!isChangeMode) return currentVal;
            let originalRaw = originalSongsMap[key] || "";
            let originalClean = cleanSongName(originalRaw);
            let currentClean = cleanSongName(currentVal);
            if (originalClean !== currentClean) { return currentClean + '(変更)'; }
            return originalRaw;
        };

        let songMap = {}; let groupName = "";
        if (finalWorshipType === '特別賛美') {
            const teamSel = document.getElementById('specialTeamSelect').value;
            groupName = teamSel === '__OTHER__' ? document.getElementById('specialTeamManual').value : teamSel;
            const isManualSong = document.getElementById('book_filterSpecial').value === '__MANUAL__';
            let specSong = isManualSong ? document.getElementById('specialSongManual').value : document.getElementById('specialSongSelect').value;

            // ① オケ有のときのみ曲名末尾に(オケ有)を付記。オケ情報は備考欄には書かない(GAS側も対応済み)
            const okeType = rawData.okeType || "オケ無";
            const baseSong = cleanSongName(specSong);
            if (!baseSong) {
                alert('特別賛美の曲が未選択です。');
                submitBtn.disabled = false; loadingMsg.classList.add('hidden');
                return;
            }
            const okeSuffix = okeType === "オケ有" ? "(オケ有)" : "";
            const originalRaw = originalSongsMap["選曲"] || "";
            if (isChangeMode && originalRaw && cleanSongName(originalRaw) === baseSong) {
                const origOke = originalRaw.indexOf("(オケ有)") >= 0 ? "(オケ有)" : "";
                // 曲が同じ: オケも同じなら元表記を維持、オケのみ変更なら新しいオケ状態で上書き
                songMap["選曲"] = (origOke === okeSuffix) ? originalRaw : (baseSong + okeSuffix);
            } else if (isChangeMode && originalRaw) {
                // 曲を変更: オケ表記を保持したまま(変更)を付記
                songMap["選曲"] = baseSong + okeSuffix + "(変更)";
            } else {
                songMap["選曲"] = baseSong + okeSuffix;
            }
        } else {
            for (let idx = 0; idx < songInputKeys.length; idx++) {
                const key = songInputKeys[idx];
                const el = document.getElementById('song_dyn' + idx);
                const val = el ? el.value : "";
                if (!val || val === '__OTHER__') {
                    alert(`["曲順 ${key}"] の曲が未選択です。`);
                    submitBtn.disabled = false; loadingMsg.classList.add('hidden');
                    return;
                }
                if (key.indexOf('固定') >= 0 && /god\s*is\s*working/i.test(val)) {
                    songMap[key] = FIXED_SONG; 
                } else {
                    songMap[key] = processSongName(key, val);
                }
            }
        }

        const postPayload = { meetingEvent: finalMeetingEvent, worshipType: finalWorshipType, singerName: rawData.singerName || "", groupName: groupName, okeDetails: rawData.okeType || "オケ無", remarks: rawData.remarks || "", action: 'submit', songMap: songMap, contactType: rawData.contactType };
        try {
            await fetch(CONFIG.GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify(postPayload) });
            const displayName = finalWorshipType === '特別賛美' ? groupName : (rawData.singerName || "");
            showCompleteModal(displayName, songMap); 
            
            // 完全初期化
            e.target.reset(); 
            handleMainWorshipTypeChange('');
            originalSongsMap = {};
            songInputKeys = [];
            document.getElementById('finalContactType').value = "新規";
            updateSubmitButtonLabel();
            
            // ⑤ 同一セッション内で続けて変更連絡する場合に備え、担当マスタを再取得(全曲はキャッシュ利用)
            try {
                const fresh = await fetchJSONP(CONFIG.GAS_WEBAPP_URL, { action: 'loadInit', skipSongs: 'true' }, 'cb_refresh');
                masterData.dynamicDuties = fresh.dynamicDuties || masterData.dynamicDuties;
                masterData.specialTeams = fresh.specialTeams || masterData.specialTeams;
                renderSpecialTeamDropdown();
            } catch (refreshErr) { /* 失敗しても次回ページ読込で最新化される */ }
            
            const initModal = document.getElementById('initModal');
            initModal.style.display = 'flex';
            initModal.classList.remove('hidden');
            document.querySelector('input[name="initContactType"][value="新規"]').checked = true;
            
        } catch (error) { alert('送信エラー。'); }
        finally { submitBtn.disabled = false; loadingMsg.classList.add('hidden'); }
    });
</script>
</body>
</html>
