<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイホームページ</title>
</head>
<body>

    <!-- 用途①：フォームの設置 -->
    <h2>お問い合わせフォーム</h2>
    <!-- 
      ※GitHub Pagesは静的サイト専用のため、HTMLだけでは送信機能が動きません。
      formrun、SSForm、Googleフォーム、Formspreeなどの外部サービスを利用し、
      指定されたaction属性のURLを以下に設定してください。
    -->
    <form action="ここに外部フォームサービスのURL" method="POST">
        <label>お名前: <input type="text" name="name" required></label><br><br>
        <label>メール: <input type="email" name="email" required></label><br><br>
        <label>内容: <textarea name="message" required></textarea></label><br><br>
        <button type="submit">送信</button>
    </form>

    <hr>


</body>
</html>
